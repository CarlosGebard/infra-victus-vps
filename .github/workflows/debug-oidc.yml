name: test-infisical-oidc

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Get GitHub OIDC token
        id: oidc
        run: |
          set -euo pipefail
          RESP=$(curl -sS \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://github.com/${GITHUB_REPOSITORY_OWNER}")
          JWT=$(echo "$RESP" | jq -r '.value')
          echo "JWT obtenido"
          echo "jwt=$JWT" >> "$GITHUB_OUTPUT"
      - name: Print JWT payload
        run: |
          python3 - <<'PY'
import os, json, base64

jwt = """${{ steps.oidc.outputs.jwt }}"""
payload = jwt.split(".")[1]
payload += "=" * (-len(payload) % 4)
decoded = json.loads(base64.urlsafe_b64decode(payload).decode())
print(json.dumps(decoded, indent=2))
PY
      - name: Login to Infisical
        run: |
          curl -i -X POST https://us.infisical.com/api/v1/auth/oidc-auth/login \
            -H "Content-Type: application/json" \
            -d "{
              \"identityId\": \"0a100e5d-1422-437e-b447-e032f32403fa\",
              \"jwt\": \"${{ steps.oidc.outputs.jwt }}\",
              \"organizationSlug\": \"victus-y3h-g\"
            }"
