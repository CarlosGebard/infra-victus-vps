---
- name: Ensure infrastructure directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ srv_root }}", mode: "0755" }
    - { path: "{{ srv_root }}/apps", mode: "0755" }
    - { path: "{{ srv_root }}/apps/core", mode: "0755" }
    - { path: "{{ srv_root }}/apps/core/nginx", mode: "0755" }
    - { path: "{{ srv_root }}/apps/core/nginx/conf.d", mode: "0755" }
    - { path: "{{ srv_root }}/apps/core/couchdb", mode: "0755" }
    - { path: "{{ srv_root }}/apps/core/couchdb/local.d", mode: "0755" }
    - { path: "{{ srv_root }}/apps/core/observability", mode: "0755" }
    - { path: "{{ srv_root }}/apps/core/observability/loki", mode: "0755" }
    - { path: "{{ srv_root }}/apps/core/observability/prometheus", mode: "0755" }
    - { path: "{{ srv_root }}/apps/core/observability/grafana", mode: "0755" }
    - { path: "{{ srv_root }}/apps/core/observability/grafana/provisioning", mode: "0755" }
    - { path: "{{ srv_root }}/apps/core/observability/grafana/provisioning/datasources", mode: "0755" }
    - { path: "{{ srv_root }}/data", mode: "0750" }
    - { path: "{{ srv_root }}/data/couchdb", mode: "0750" }
    - { path: "{{ srv_root }}/data/couchdb/data", mode: "0750" }
    - { path: "{{ srv_root }}/data/seaweed", mode: "0750" }
    - { path: "{{ srv_root }}/data/seaweed/data", mode: "0750" }
    - { path: "{{ srv_root }}/data/observability", mode: "0750" }
    - { path: "{{ srv_root }}/data/observability/loki", mode: "0750" }
    - { path: "{{ srv_root }}/data/observability/prometheus", mode: "0750" }
    - { path: "{{ srv_root }}/data/observability/grafana", mode: "0750" }
    - { path: "{{ srv_root }}/logs", mode: "0750" }
    - { path: "{{ srv_root }}/logs/nginx", mode: "0750" }
    - { path: "{{ srv_root }}/logs/observability", mode: "0750" }
    - { path: "{{ srv_root }}/backups", mode: "0750" }
    - { path: "{{ srv_root }}/secrets", mode: "0750" }
    - { path: "{{ srv_root }}/secrets/runtime", mode: "0750" }
