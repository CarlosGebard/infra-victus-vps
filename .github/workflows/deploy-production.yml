name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: false
        default: main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy core stack to production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    permissions:
      contents: read
    env:
      PROD_HOST: ${{ vars.PROD_HOST }}
      PROD_SSH_USER: ${{ vars.PROD_SSH_USER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: python -m pip install --upgrade pip ansible-core

      - name: Prepare SSH trust material
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          printf '%s\n' "${{ vars.PROD_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519
          chmod 644 ~/.ssh/known_hosts

      - name: Render ephemeral production inventory
        run: |
          {
            echo 'all:'
            echo '  children:'
            echo '    vps:'
            echo '      hosts:'
            echo '        production:'
            echo "          ansible_host: ${PROD_HOST}"
            echo "          ansible_user: ${PROD_SSH_USER}"
            echo '          ansible_become: true'
          } > .github/production.inventory.yml

      - name: Syntax check deploy playbook
        run: ansible-playbook --private-key ~/.ssh/id_ed25519 -i .github/production.inventory.yml ansible/playbooks/deploy-core.yml --syntax-check

      - name: Verify SSH connectivity before deploy
        run: |
          ssh \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -i ~/.ssh/id_ed25519 \
            "${PROD_SSH_USER}@${PROD_HOST}" \
            "echo ssh-ok"

      - name: Deploy core stack
        run: ansible-playbook --private-key ~/.ssh/id_ed25519 -i .github/production.inventory.yml ansible/playbooks/deploy-core.yml
