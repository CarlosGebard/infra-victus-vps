---
- name: Ensure Infisical bootstrap directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  loop:
    - "{{ srv_root }}/apps/infisical-bootstrap"
    - "{{ srv_root }}/data/infisical"
    - "{{ srv_root }}/data/infisical/postgres"
    - "{{ srv_root }}/data/infisical/redis"

- name: Copy Infisical bootstrap compose file
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../compose/stacks/infisical-bootstrap/docker-compose.yml"
    dest: "{{ srv_root }}/apps/infisical-bootstrap/docker-compose.yml"
    owner: root
    group: root
    mode: "0640"

- name: Copy Infisical bootstrap env example for operator reference
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../secrets/bootstrap/infisical.env.example"
    dest: "{{ srv_root }}/apps/infisical-bootstrap/.env.example"
    owner: root
    group: root
    mode: "0640"

- name: Check whether Infisical bootstrap env file exists
  ansible.builtin.stat:
    path: "{{ infisical_bootstrap_env_path }}"
  register: infisical_bootstrap_env_stat

- name: Stop bootstrap when Infisical env file is missing
  ansible.builtin.assert:
    that:
      - infisical_bootstrap_env_stat.stat.exists
    fail_msg: >-
      Missing Infisical bootstrap env file at {{ infisical_bootstrap_env_path }}.
      Create it from secrets/bootstrap/infisical.env.example before deploy.

- name: Link active bootstrap environment file into the stack directory
  ansible.builtin.file:
    src: "{{ infisical_bootstrap_env_path }}"
    dest: "{{ srv_root }}/apps/infisical-bootstrap/.env"
    state: link

- name: Validate rendered Infisical bootstrap Compose configuration
  ansible.builtin.command:
    cmd: docker compose --env-file {{ infisical_bootstrap_env_path }} -f {{ srv_root }}/apps/infisical-bootstrap/docker-compose.yml config
  changed_when: false

- name: Deploy the Infisical bootstrap stack
  ansible.builtin.command:
    cmd: docker compose --env-file {{ infisical_bootstrap_env_path }} -f {{ srv_root }}/apps/infisical-bootstrap/docker-compose.yml up -d
  register: deploy_infisical_bootstrap_up
  changed_when: >-
    'Started' in deploy_infisical_bootstrap_up.stdout or
    'Recreated' in deploy_infisical_bootstrap_up.stdout or
    'Creating' in deploy_infisical_bootstrap_up.stdout
