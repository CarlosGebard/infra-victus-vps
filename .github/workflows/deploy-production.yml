name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: false
        default: main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production from Infisical runtime secrets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      INFISICAL_API_URL: ${{ vars.INFISICAL_API_URL }}
      INFISICAL_ORGANIZATION_SLUG: ${{ vars.INFISICAL_ORGANIZATION_SLUG }}
      INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG }}
      INFISICAL_ENV_SLUG: ${{ vars.INFISICAL_ENV_SLUG }}
      INFISICAL_IDENTITY_ID: 0a100e5d-1422-437e-b447-e032f32403fa
      INFISICAL_OIDC_AUDIENCE: https://github.com/CarlosGebard
      INFISICAL_CONNECTION_SECRET_PATH: /connection
      INFISICAL_RUNTIME_SECRET_PATH: /runtime

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Infisical workflow metadata
        run: |
          test -n "${INFISICAL_API_URL}"
          test -n "${INFISICAL_ORGANIZATION_SLUG}"
          test -n "${INFISICAL_PROJECT_SLUG}"
          test -n "${INFISICAL_ENV_SLUG}"
          case "${INFISICAL_API_URL}" in
            http://*|https://*) ;;
            *)
              echo "INFISICAL_API_URL must include http:// or https://, got: ${INFISICAL_API_URL}" >&2
              exit 1
              ;;
          esac

      - name: Debug GitHub OIDC claims
        run: |
          python3 <<'PY'
          import base64
          import json
          import os
          import urllib.parse
          import urllib.request

          audience = os.environ["INFISICAL_OIDC_AUDIENCE"]
          oidc_url = f'{os.environ["ACTIONS_ID_TOKEN_REQUEST_URL"]}&audience={urllib.parse.quote(audience, safe="")}'
          request = urllib.request.Request(
              oidc_url,
              headers={"Authorization": f'Bearer {os.environ["ACTIONS_ID_TOKEN_REQUEST_TOKEN"]}'},
          )
          with urllib.request.urlopen(request) as response:
              token = json.loads(response.read().decode("utf-8"))["value"]

          parts = token.split(".")
          if len(parts) != 3:
              raise SystemExit("Unexpected OIDC token format")
          payload = parts[1]
          padding = "=" * (-len(payload) % 4)
          claims = json.loads(base64.urlsafe_b64decode(payload + padding).decode("utf-8"))

          debug_claims = {
              "iss": claims.get("iss"),
              "aud": claims.get("aud"),
              "sub": claims.get("sub"),
              "repository": claims.get("repository"),
              "ref": claims.get("ref"),
              "environment": claims.get("environment"),
          }
          print(json.dumps(debug_claims, indent=2, sort_keys=True))
          PY

      - name: Fetch deploy secrets from Infisical with GitHub OIDC
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          import urllib.error
          import uuid

          def request_json(method: str, url: str, *, headers: dict[str, str] | None = None, payload: dict | None = None, form: dict | None = None) -> dict:
              request = urllib.request.Request(url, method=method)
              for key, value in (headers or {}).items():
                  request.add_header(key, value)
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
                  request.add_header("Content-Type", "application/json")
              elif form is not None:
                  data = urllib.parse.urlencode(form).encode("utf-8")
                  request.add_header("Content-Type", "application/x-www-form-urlencoded")
              try:
                  with urllib.request.urlopen(request, data=data) as response:
                      return json.loads(response.read().decode("utf-8"))
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8", errors="replace")
                  raise SystemExit(f"HTTP {exc.code} calling {url}: {body[:2000]}")

          api_url = os.environ["INFISICAL_API_URL"].strip().rstrip("/")
          if api_url.endswith("/api"):
              api_url = api_url[:-4]
          organization_slug = os.environ["INFISICAL_ORGANIZATION_SLUG"]
          audience = os.environ["INFISICAL_OIDC_AUDIENCE"]
          identity_id = os.environ["INFISICAL_IDENTITY_ID"]
          project_slug = os.environ["INFISICAL_PROJECT_SLUG"]
          env_slug = os.environ["INFISICAL_ENV_SLUG"]
          env_file = os.environ["GITHUB_ENV"]

          oidc_url = f'{os.environ["ACTIONS_ID_TOKEN_REQUEST_URL"]}&audience={urllib.parse.quote(audience, safe="")}'
          oidc_response = request_json(
              "GET",
              oidc_url,
              headers={"Authorization": f'Bearer {os.environ["ACTIONS_ID_TOKEN_REQUEST_TOKEN"]}'},
          )
          oidc_jwt = oidc_response["value"]

          payload_b64 = oidc_jwt.split(".")[1]
          padding = "=" * (-len(payload_b64) % 4)
          decoded = base64.urlsafe_b64decode(payload_b64 + padding).decode("utf-8")
          print(decoded)

          login_response = request_json(
              "POST",
              f"{api_url}/api/v1/auth/oidc-auth/login",
              payload={
                  "identityId": identity_id,
                  "jwt": oidc_jwt,
                  "organizationSlug": organization_slug,
              },
          )
          access_token = login_response["accessToken"]

          projects_response = request_json(
              "GET",
              f"{api_url}/api/v1/projects",
              headers={"Authorization": f"Bearer {access_token}"},
          )
          project_id = ""
          for project in projects_response.get("projects", []):
              if str(project.get("slug", "")).strip() == project_slug:
                  project_id = str(project.get("id", "")).strip()
                  break
          if not project_id:
              raise SystemExit(f"Infisical project slug not found: {project_slug}")

          def fetch_path(secret_path: str) -> dict[str, str]:
              query = urllib.parse.urlencode(
                  {
                      "projectId": project_id,
                      "environment": env_slug,
                      "secretPath": secret_path,
                      "viewSecretValue": "true",
                      "expandSecretReferences": "true",
                      "includeImports": "true",
                      "recursive": "false",
                  }
              )
              response = request_json(
                  "GET",
                  f"{api_url}/api/v4/secrets?{query}",
                  headers={"Authorization": f"Bearer {access_token}"},
              )
              secrets: dict[str, str] = {}
              for item in response.get("secrets", []):
                  key = str(item.get("secretKey", "")).strip()
                  value = item.get("secretValue")
                  if key and value is not None:
                      secrets[key] = str(value)
              return secrets

          secrets = {}
          secrets.update(fetch_path(os.environ["INFISICAL_CONNECTION_SECRET_PATH"]))
          secrets.update(fetch_path(os.environ["INFISICAL_RUNTIME_SECRET_PATH"]))

          required = (
              "PROD_HOST",
              "PROD_SSH_USER",
              "PROD_SSH_PRIVATE_KEY",
              "PROD_SSH_KNOWN_HOSTS",
              "COUCHDB_PASSWORD",
              "GRAFANA_ADMIN_PASSWORD",
              "SEAWEED_S3_ACCESS_KEY",
              "SEAWEED_S3_SECRET_KEY",
          )
          missing = [key for key in required if not secrets.get(key, "").strip()]
          if missing:
              raise SystemExit(f"Missing required Infisical secrets: {', '.join(missing)}")

          with open(env_file, "a", encoding="utf-8") as handle:
              for key, value in secrets.items():
                  delimiter = f"EOF_{uuid.uuid4().hex}"
                  handle.write(f"{key}<<{delimiter}\n{value}\n{delimiter}\n")
          PY

      - name: Install Ansible
        run: python -m pip install --upgrade pip ansible-core

      - name: Install Ansible collections
        run: ansible-galaxy collection install -p ./.ansible/collections -r ansible/requirements.yml

      - name: Validate required runtime inputs
        run: |
          test -n "${PROD_HOST}"
          test -n "${PROD_SSH_USER}"
          test -n "${PROD_SSH_PRIVATE_KEY}"
          test -n "${PROD_SSH_KNOWN_HOSTS}"
          test -n "${COUCHDB_PASSWORD}"
          test -n "${GRAFANA_ADMIN_PASSWORD}"
          test -n "${SEAWEED_S3_ACCESS_KEY}"
          test -n "${SEAWEED_S3_SECRET_KEY}"

      - name: Write repository Ansible config
        run: |
          cat > .github/ansible.cfg <<'EOF'
          [defaults]
          inventory = .github/production.inventory.yml
          roles_path = ansible/roles
          collections_path = ./.ansible/collections:~/.ansible/collections:/usr/share/ansible/collections
          retry_files_enabled = False
          host_key_checking = True
          EOF

      - name: Prepare SSH trust material
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${PROD_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          printf '%s\n' "${PROD_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519
          chmod 644 ~/.ssh/known_hosts

      - name: Render ephemeral production inventory
        run: |
          {
            echo 'all:'
            echo '  children:'
            echo '    vps:'
            echo '      hosts:'
            echo '        production:'
            echo "          ansible_host: ${PROD_HOST}"
            echo "          ansible_user: ${PROD_SSH_USER}"
            echo '          ansible_become: true'
          } > .github/production.inventory.yml

      - name: Render runtime secret files
        run: |
          cat > "${RUNNER_TEMP}/core.env" <<EOF
          COUCHDB_USER=${COUCHDB_USER:-admin}
          COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
          GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
          GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
          EOF

          cat > "${RUNNER_TEMP}/seaweed-s3.json" <<EOF
          {
            "identities": [
              {
                "name": "admin",
                "credentials": [
                  {
                    "accessKey": "${SEAWEED_S3_ACCESS_KEY}",
                    "secretKey": "${SEAWEED_S3_SECRET_KEY}"
                  }
                ],
                "actions": [
                  "Admin",
                  "Read",
                  "Write",
                  "List",
                  "Tagging"
                ]
              }
            ]
          }
          EOF

          chmod 600 "${RUNNER_TEMP}/core.env" "${RUNNER_TEMP}/seaweed-s3.json"

      - name: Syntax check deploy playbook
        env:
          ANSIBLE_CONFIG: .github/ansible.cfg
          RUNTIME_ENV_SOURCE_FILE: ${{ runner.temp }}/core.env
          RUNTIME_SEAWEED_S3_SOURCE_FILE: ${{ runner.temp }}/seaweed-s3.json
        run: ansible-playbook --private-key ~/.ssh/id_ed25519 -i .github/production.inventory.yml ansible/runtime/playbooks/deploy-core.yml --syntax-check

      - name: Verify SSH connectivity before deploy
        run: |
          ssh \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -i ~/.ssh/id_ed25519 \
            "${PROD_SSH_USER}@${PROD_HOST}" \
            "echo ssh-ok"

      - name: Deploy core stack
        env:
          ANSIBLE_CONFIG: .github/ansible.cfg
          RUNTIME_ENV_SOURCE_FILE: ${{ runner.temp }}/core.env
          RUNTIME_SEAWEED_S3_SOURCE_FILE: ${{ runner.temp }}/seaweed-s3.json
        run: ansible-playbook --private-key ~/.ssh/id_ed25519 -i .github/production.inventory.yml ansible/runtime/playbooks/deploy-core.yml

      - name: Validate core runtime after deploy
        env:
          ANSIBLE_CONFIG: .github/ansible.cfg
        run: ansible-playbook --private-key ~/.ssh/id_ed25519 -i .github/production.inventory.yml ansible/runtime/playbooks/validate-core-runtime.yml
