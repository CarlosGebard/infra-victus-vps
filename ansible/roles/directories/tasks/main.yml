---
- name: Ensure infrastructure directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop: "{{ runtime_layout.public_dirs + runtime_layout.restricted_dirs }}"

- name: Ensure service data directories have container-compatible ownership
  ansible.builtin.file:
    path: "{{ item.value.path }}"
    state: directory
    owner: "{{ item.value.uid }}"
    group: "{{ item.value.gid }}"
    mode: "{{ item.value.mode }}"
    recurse: true
  loop: "{{ runtime_service_ownership | dict2items }}"
