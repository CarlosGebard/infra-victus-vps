srv_root: /srv
compose_project_name: core
runtime_env_path: /srv/secrets/runtime/core.env
runtime_seaweed_s3_config_path: /srv/secrets/runtime/seaweed-s3.json
runtime_env_source_file: "{{ lookup('ansible.builtin.env', 'RUNTIME_ENV_SOURCE_FILE') | default('', true) }}"
runtime_seaweed_s3_source_file: "{{ lookup('ansible.builtin.env', 'RUNTIME_SEAWEED_S3_SOURCE_FILE') | default('', true) }}"
private_access_only: true
admin_user: carlos
bootstrap_copy_root_authorized_keys: true
ssh_port: 22
firewall_allowed_tcp_ports:
  - 22
fail2ban_sshd_maxretry: 5
fail2ban_sshd_findtime: 10m
fail2ban_sshd_bantime: 1h
ubuntu_release: "noble"
install_dev_packages: true
swap_file_path: /swapfile
swap_file_size_mb: 2048
docker_apt_arch_map:
  x86_64: amd64
  aarch64: arm64
grafana_apt_arch_map:
  x86_64: amd64
  aarch64: arm64
alloy_http_listen_addr: 0.0.0.0:12345
alloy_storage_path: /var/lib/alloy/data
alloy_loki_write_url: http://127.0.0.1:3100/loki/api/v1/push
runtime_service_ownership:
  couchdb:
    path: /srv/data/couchdb/data
    uid: 5984
    gid: 5984
    mode: "0750"
  seaweed:
    path: /srv/data/seaweed/data
    uid: 1000
    gid: 1000
    mode: "0750"
  loki:
    path: /srv/data/observability/loki
    uid: 10001
    gid: 10001
    mode: "0750"
  loki_chunks:
    path: /srv/data/observability/loki/chunks
    uid: 10001
    gid: 10001
    mode: "0750"
  loki_compactor:
    path: /srv/data/observability/loki/compactor
    uid: 10001
    gid: 10001
    mode: "0750"
  prometheus:
    path: /srv/data/observability/prometheus
    uid: 65534
    gid: 65534
    mode: "0750"
  grafana:
    path: /srv/data/observability/grafana
    uid: 472
    gid: 472
    mode: "0750"
runtime_layout:
  public_dirs:
    - { path: "/srv", mode: "0755" }
    - { path: "/srv/apps", mode: "0755" }
    - { path: "/srv/apps/core", mode: "0755" }
    - { path: "/srv/apps/core/nginx", mode: "0755" }
    - { path: "/srv/apps/core/nginx/conf.d", mode: "0755" }
    - { path: "/srv/apps/core/couchdb", mode: "0755" }
    - { path: "/srv/apps/core/couchdb/local.d", mode: "0755" }
    - { path: "/srv/apps/core/observability", mode: "0755" }
    - { path: "/srv/apps/core/observability/loki", mode: "0755" }
    - { path: "/srv/apps/core/observability/prometheus", mode: "0755" }
    - { path: "/srv/apps/core/observability/grafana", mode: "0755" }
    - { path: "/srv/apps/core/observability/grafana/provisioning", mode: "0755" }
    - { path: "/srv/apps/core/observability/grafana/provisioning/datasources", mode: "0755" }
  restricted_dirs:
    - { path: "/srv/data", mode: "0750" }
    - { path: "/srv/data/couchdb", mode: "0750" }
    - { path: "/srv/data/couchdb/data", mode: "0750" }
    - { path: "/srv/data/seaweed", mode: "0750" }
    - { path: "/srv/data/seaweed/data", mode: "0750" }
    - { path: "/srv/data/observability", mode: "0750" }
    - { path: "/srv/data/observability/loki", mode: "0750" }
    - { path: "/srv/data/observability/loki/chunks", mode: "0750" }
    - { path: "/srv/data/observability/loki/compactor", mode: "0750" }
    - { path: "/srv/data/observability/prometheus", mode: "0750" }
    - { path: "/srv/data/observability/grafana", mode: "0750" }
    - { path: "/srv/logs", mode: "0750" }
    - { path: "/srv/logs/nginx", mode: "0750" }
    - { path: "/srv/logs/observability", mode: "0750" }
    - { path: "/srv/backups", mode: "0750" }
    - { path: "/srv/secrets", mode: "0750" }
    - { path: "/srv/secrets/runtime", mode: "0750" }
runtime_deploy_dirs:
  - { path: "/srv/apps/core", mode: "0755" }
  - { path: "/srv/apps/core/nginx", mode: "0755" }
  - { path: "/srv/apps/core/nginx/conf.d", mode: "0755" }
  - { path: "/srv/apps/core/couchdb", mode: "0755" }
  - { path: "/srv/apps/core/couchdb/local.d", mode: "0755" }
  - { path: "/srv/apps/core/observability", mode: "0755" }
  - { path: "/srv/apps/core/observability/loki", mode: "0755" }
  - { path: "/srv/apps/core/observability/prometheus", mode: "0755" }
  - { path: "/srv/apps/core/observability/grafana", mode: "0755" }
  - { path: "/srv/apps/core/observability/grafana/provisioning", mode: "0755" }
  - { path: "/srv/apps/core/observability/grafana/provisioning/datasources", mode: "0755" }
  - { path: "/srv/secrets/runtime", mode: "0750" }
tailscale_enabled: true
tailscale_auth_key: "{{ lookup('ansible.builtin.env', 'TAILSCALE_AUTH_KEY') | default('', true) }}"
tailscale_advertise_tags:
  - tag:vps
tailscale_enable_ssh: false
tailscale_hostname: infra-victus-vps
tailscale_args_extra: ""
base_packages:
  - acl
  - apt-transport-https
  - ca-certificates
  - cloud-guest-utils
  - cloud-init
  - curl
  - gnupg
  - lsb-release
  - openssh-server
  - python3
  - qemu-guest-agent
  - rsync
  - software-properties-common
  - sudo
  - unattended-upgrades
  - wget
security_packages:
  - fail2ban
  - ufw
ops_packages:
  - htop
  - jq
  - lsof
  - mtr-tiny
  - netcat-openbsd
  - strace
  - tcpdump
dev_packages:
  - git
  - neovim
  - tmux
