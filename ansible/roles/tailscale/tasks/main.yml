---
- name: Ensure Tailscale keyring directory exists
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: tailscale_enabled

- name: Install Tailscale archive key
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/{{ tailscale_track }}/ubuntu/{{ ubuntu_release }}.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    owner: root
    group: root
    mode: "0644"
  when: tailscale_enabled

- name: Install Tailscale repository definition
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/{{ tailscale_track }}/ubuntu/{{ ubuntu_release }}.tailscale-keyring.list"
    dest: /etc/apt/sources.list.d/tailscale.list
    owner: root
    group: root
    mode: "0644"
  when: tailscale_enabled

- name: Install Tailscale package
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: tailscale_enabled

- name: Enable and start tailscaled
  ansible.builtin.service:
    name: tailscaled
    state: started
    enabled: true
  when: tailscale_enabled

- name: Read current Tailscale state
  ansible.builtin.command: tailscale status --json
  register: tailscale_status_raw
  changed_when: false
  failed_when: false
  when: tailscale_enabled

- name: Parse current Tailscale state
  ansible.builtin.set_fact:
    tailscale_status: "{{ tailscale_status_raw.stdout | default('{}') | from_json }}"
  when:
    - tailscale_enabled
    - tailscale_status_raw.rc == 0
    - tailscale_status_raw.stdout | default('') | length > 0

- name: Build desired Tailscale flags
  ansible.builtin.set_fact:
    tailscale_desired_flags: >-
      {{
        (
          (['--advertise-tags=' ~ (tailscale_advertise_tags | join(','))] if tailscale_advertise_tags | length > 0 else [])
          + (['--ssh', '--accept-risk=lose-ssh'] if tailscale_enable_ssh else [])
          + (['--hostname=' ~ tailscale_hostname] if tailscale_hostname | length > 0 else [])
          + ([tailscale_args_extra] if tailscale_args_extra | trim | length > 0 else [])
        ) | join(' ')
      }}
  when: tailscale_enabled

- name: Persist desired non-secret Tailscale flags
  ansible.builtin.copy:
    dest: /etc/tailscale/managed-up.flags
    content: "{{ tailscale_desired_flags }}\n"
    owner: root
    group: root
    mode: "0600"
  register: tailscale_managed_flags
  when: tailscale_enabled

- name: Refuse first-time Tailscale bootstrap without auth key
  ansible.builtin.assert:
    that:
      - tailscale_auth_key | length > 0
    fail_msg: >-
      tailscale_auth_key is required for first-time bootstrap when tailscale is
      enabled and the node is not yet connected.
  when:
    - tailscale_enabled
    - (tailscale_status.BackendState | default('Stopped')) != 'Running'

- name: Join or update Tailscale node
  ansible.builtin.shell: >-
    tailscale up --auth-key="$TS_AUTH_KEY"
    {{ tailscale_desired_flags }}
  args:
    executable: /bin/bash
  environment:
    TS_AUTH_KEY: "{{ tailscale_auth_key }}"
  register: tailscale_up
  changed_when: true
  no_log: true
  when:
    - tailscale_enabled
    - tailscale_auth_key | length > 0
    - (tailscale_status.BackendState | default('Stopped')) != 'Running' or tailscale_managed_flags.changed
