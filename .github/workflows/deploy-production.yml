name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: false
        default: main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production from Infisical runtime secrets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      INFISICAL_DOMAIN: ${{ vars.INFISICAL_DOMAIN }}
      INFISICAL_IDENTITY_ID: ${{ vars.INFISICAL_IDENTITY_ID }}
      INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG }}
      INFISICAL_ENV_SLUG: ${{ vars.INFISICAL_ENV_SLUG }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Fetch deploy secrets from Infisical with OIDC
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: oidc
          identity-id: ${{ env.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV_SLUG }}
          domain: ${{ env.INFISICAL_DOMAIN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: python -m pip install --upgrade pip ansible-core

      - name: Install Ansible collections
        run: ansible-galaxy collection install -p ./.ansible/collections -r ansible/requirements.yml

      - name: Validate required runtime inputs
        run: |
          test -n "${PROD_HOST}"
          test -n "${PROD_SSH_USER}"
          test -n "${PROD_SSH_PRIVATE_KEY}"
          test -n "${PROD_SSH_KNOWN_HOSTS}"
          test -n "${COUCHDB_PASSWORD}"
          test -n "${POSTGRES_PASSWORD}"
          test -n "${INFISICAL_REDIS_PASSWORD}"
          test -n "${INFISICAL_ENCRYPTION_KEY}"
          test -n "${INFISICAL_AUTH_SECRET}"
          test -n "${GRAFANA_ADMIN_PASSWORD}"
          test -n "${SEAWEED_S3_ACCESS_KEY}"
          test -n "${SEAWEED_S3_SECRET_KEY}"

      - name: Write repository Ansible config
        run: |
          cat > .github/ansible.cfg <<'EOF'
          [defaults]
          inventory = .github/production.inventory.yml
          roles_path = ansible/roles
          collections_path = ./.ansible/collections:~/.ansible/collections:/usr/share/ansible/collections
          retry_files_enabled = False
          host_key_checking = True
          EOF

      - name: Prepare SSH trust material
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${PROD_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          printf '%s\n' "${PROD_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519
          chmod 644 ~/.ssh/known_hosts

      - name: Render ephemeral production inventory
        run: |
          {
            echo 'all:'
            echo '  children:'
            echo '    vps:'
            echo '      hosts:'
            echo '        production:'
            echo "          ansible_host: ${PROD_HOST}"
            echo "          ansible_user: ${PROD_SSH_USER}"
            echo '          ansible_become: true'
          } > .github/production.inventory.yml

      - name: Render runtime secret files
        run: |
          cat > "${RUNNER_TEMP}/core.env" <<EOF
          GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
          INFISICAL_ENCRYPTION_KEY=${INFISICAL_ENCRYPTION_KEY}
          INFISICAL_AUTH_SECRET=${INFISICAL_AUTH_SECRET}
          INFISICAL_REDIS_PASSWORD=${INFISICAL_REDIS_PASSWORD}
          COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          EOF

          cat > "${RUNNER_TEMP}/seaweed-s3.json" <<EOF
          {
            "identities": [
              {
                "name": "admin",
                "credentials": [
                  {
                    "accessKey": "${SEAWEED_S3_ACCESS_KEY}",
                    "secretKey": "${SEAWEED_S3_SECRET_KEY}"
                  }
                ],
                "actions": [
                  "Admin",
                  "Read",
                  "Write",
                  "List",
                  "Tagging"
                ]
              }
            ]
          }
          EOF

          chmod 600 "${RUNNER_TEMP}/core.env" "${RUNNER_TEMP}/seaweed-s3.json"

      - name: Syntax check deploy playbook
        env:
          ANSIBLE_CONFIG: .github/ansible.cfg
          RUNTIME_ENV_SOURCE_FILE: ${{ runner.temp }}/core.env
          RUNTIME_SEAWEED_S3_SOURCE_FILE: ${{ runner.temp }}/seaweed-s3.json
        run: ansible-playbook --private-key ~/.ssh/id_ed25519 -i .github/production.inventory.yml ansible/playbooks/deploy-core.yml --syntax-check

      - name: Verify SSH connectivity before deploy
        run: |
          ssh \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -i ~/.ssh/id_ed25519 \
            "${PROD_SSH_USER}@${PROD_HOST}" \
            "echo ssh-ok"

      - name: Deploy core stack
        env:
          ANSIBLE_CONFIG: .github/ansible.cfg
          RUNTIME_ENV_SOURCE_FILE: ${{ runner.temp }}/core.env
          RUNTIME_SEAWEED_S3_SOURCE_FILE: ${{ runner.temp }}/seaweed-s3.json
        run: ansible-playbook --private-key ~/.ssh/id_ed25519 -i .github/production.inventory.yml ansible/playbooks/deploy-core.yml

      - name: Validate core runtime after deploy
        env:
          ANSIBLE_CONFIG: .github/ansible.cfg
        run: ansible-playbook --private-key ~/.ssh/id_ed25519 -i .github/production.inventory.yml ansible/playbooks/validate-core-runtime.yml
