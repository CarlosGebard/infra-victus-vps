name: Validate Infrastructure

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: CI validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: python -m pip install --upgrade pip ansible-core

      - name: Install Ansible collections
        run: ansible-galaxy collection install -p ./.ansible/collections -r ansible/requirements.yml

      - name: Run CI-safe infrastructure validation
        env:
          ARTIFACTS_DIR: ${{ github.workspace }}/artifacts/validation
        run: ./ops/checks/validate-ci.sh

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs
          path: artifacts/validation
          if-no-files-found: warn
